<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Anti-Phishing Test</title>

        <!--The google font Oswald-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">

        <!--The google font Google Sans, used so capital i and lowercase l get confused as often as possible-->

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
        
        <!--Link to the stylesheet-->
        <link rel="stylesheet" href="style.css">
    </head>
    <body style="font-family: "Google Sans", sans-serif; font-optical-sizing: auto; font-weight: 400; font-style: normal; font-variation-settings: "GRAD" 0;">
        
        <!--Making the email format-->
        <h1 id="subject">Subject</h1>

        <h5 id="email address" style="display: inline-block">Email Address</h5>

        <div class="square" style="">External</div>

        <style>
            .square{
                width: 10dvw;
                height: 5dvh
                background: rgb(235, 172, 0);
                border: 5px solid black;
                display: inline-flex;
                justify-content: center;
                align-items: center;
                color: black;
            }
        </style>

        <h3>Email</h3>

        <h3>Email Closing</h3>

        <h2>Is this a phishing email?</h2>

        <button>Yes</button>
        <button>No</button>
    </body>
</html>
