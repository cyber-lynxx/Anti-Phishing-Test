<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Anti-Phishing Test</title>

        <!--The google font Oswald-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">

        <!--The google font Google Sans, used so capital i and lowercase l get confused as often as possible-->

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
        
        <!--Link to the stylesheet-->
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="email_body">
        
        <!--Making the email format-->
        <h1 id="subject">Subject</h1>

        <p id="email address" style="display: inline-block">Email Address</p>

        <button style="height: 20px; color: black; background: rgb(255, 171, 26); border: 2px solid black; border-radius: 0%; cursor: default;">External</button>

        <h3 id="email">Email</h3>

        <!--Give it a little bit of spacing before the closing-->
        <br></br>
        <br></br>

        <h3 id="email_closing">Email Closing</h3>

        <h4 style="align-self: center;">Is this a phishing email?</h4>

        <div style="display: flex; flex-direction: row; gap: 10px; align-self: center; align-items: center;">
            <button style="display: inline-block; height: 25px; width: 50px;">Yes</button>
            <button style="display: inline-block; height: 25px; width: 50px;">No</button>
        </div>
        
    </body>
</html>
